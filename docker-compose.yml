version: "3.8"
services:
  db:
    image: postgis/postgis:16-3.5
    restart: always
    container_name: WorshipHubPostgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worshiphub
    ports:
      - '5442:5432'
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d worshiphub" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: WorshipHubMailpit
    restart: always
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
