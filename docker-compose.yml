services:
  db:
    image: postgis/postgis:16-3.5
    restart: always
    container_name: WorshipHubPostgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worshiphub
    ports:
      - '5442:5432'
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d worshiphub" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worshiphub-net

  mailpit:
    image: axllent/mailpit
    container_name: WorshipHubMailpit
    restart: always
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - worshiphub-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.native
    container_name: WorshipHubBackend
    ports:
      - "9090:8080"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DATABASE_URL=jdbc:postgresql://db:5432/worshiphub
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_DRIVER=org.postgresql.Driver
      - JWT_SECRET=local-dev-secret-key-for-development-only-not-for-production-use-32chars-minimum
      - FLYWAY_ENABLED=true
      - FLYWAY_BASELINE_ON_MIGRATE=true
      - SERVER_PORT=8080
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=false
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=false
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - worshiphub-net

networks:
  worshiphub-net:
    driver: bridge
