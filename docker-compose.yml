version: "3.5"
services:
  db:
    image: postgis/postgis:16-3.5
    restart: always
    container_name: WorshipHubPostgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worshiphub
    ports:
      - '5442:5432'
    volumes:
      - ./data/db:/var/lib/postgresql/data