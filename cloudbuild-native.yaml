substitutions:
  _CACHE_BUCKET: 'gs://worshiphub-478318_cloudbuild/cache'

steps:
  # Restaurar caché de Gradle
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m rsync -r ${_CACHE_BUCKET}/gradle /root/.gradle || true
    volumes:
      - name: 'gradle_cache'
        path: '/root/.gradle'

  # Compilar ejecutable nativo con GraalVM
  - name: 'ghcr.io/graalvm/graalvm-community:21'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        microdnf install -y findutils git
        chmod +x gradlew
        ./gradlew :api:nativeCompile -x test --no-daemon
    timeout: '3600s'
    volumes:
      - name: 'gradle_cache'
        path: '/root/.gradle'

  # Crear imagen Docker con ejecutable nativo
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.native'
      - '-t'
      - 'us-central1-docker.pkg.dev/worshiphub-478318/worshiphub-repo/worshiphub-api-native:latest'
      - '.'

  # Guardar caché de Gradle
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m rsync -r /root/.gradle ${_CACHE_BUCKET}/gradle
    volumes:
      - name: 'gradle_cache'
        path: '/root/.gradle'

  # Push imagen
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/worshiphub-478318/worshiphub-repo/worshiphub-api-native:latest'

  # Deploy a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'worshiphub-api-native'
      - '--image'
      - 'us-central1-docker.pkg.dev/worshiphub-478318/worshiphub-repo/worshiphub-api-native:latest'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '100'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300'
      - '--cpu-throttling'
      - '--execution-environment'
      - 'gen2'
      - '--set-env-vars'
      - 'FLYWAY_ENABLED=true,DDL_AUTO=validate,SPRING_PROFILES_ACTIVE=dev,DATABASE_URL=jdbc:postgresql://ep-falling-sun-a4hskmu4-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require,DATABASE_USERNAME=neondb_owner,DATABASE_PASSWORD=npg_wDurt4e8OMRB'

images:
  - 'us-central1-docker.pkg.dev/worshiphub-478318/worshiphub-repo/worshiphub-api-native'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'