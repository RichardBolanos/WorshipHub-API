server:
  port: 9090

spring:
  application:
    name: WorshipHub API
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: WorshipHub API
    description: Complete API for worship team management with 32 endpoints
    version: 1.0.0

logging:
  level:
    com.worshiphub: DEBUG
    org.springframework: INFO