# Configuración específica para Flyway
# Usar con: --spring.profiles.active=local,flyway

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false # Solo para desarrollo
    baseline-version: 0
    baseline-description: "Initial baseline"
    encoding: UTF-8
    connect-retries: 3
    connect-retries-interval: 10
    lock-retry-count: 50
    
    # Configuraciones adicionales para desarrollo
    out-of-order: false
    ignore-missing-migrations: false
    ignore-ignored-migrations: false
    ignore-pending-migrations: false
    ignore-future-migrations: false
    
    # Placeholders para scripts SQL
    placeholders:
      application.name: WorshipHub
      application.version: 1.0.0
    
    # Callbacks personalizados (opcional)
    callbacks:
      - com.worshiphub.config.FlywayCallback

logging:
  level:
    org.flywaydb: DEBUG
    org.flywaydb.core.internal.command: DEBUG