server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

spring:
  datasource:
    url: jdbc:postgresql://ep-falling-sun-a4hskmu4-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_wDurt4e8OMRB
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000
      pool-name: WorshipHubNeonCP
      
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
    open-in-view: false
    
  flyway:
    enabled: false
    
  security:
    require-ssl: false

jwt:
  secret: mySecretKeyForProductionThatIsAtLeast32CharactersLong123456789
  expiration: 3600000
  refresh-expiration: 86400000

logging:
  level:
    com.worshiphub: INFO
    org.springframework: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never