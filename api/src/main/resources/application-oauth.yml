# OAuth2 Configuration for Google Authentication
# This file contains the OAuth2 setup for production and development

app:
  oauth2:
    success-redirect-url: ${FRONTEND_URL:http://localhost:3000}/auth/callback
    failure-redirect-url: ${FRONTEND_URL:http://localhost:3000}/auth/error
    
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: 
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs

# Rate limiting configuration
invitation:
  rate-limit:
    max-per-day: ${INVITATION_MAX_PER_DAY:10}
    max-per-hour: ${INVITATION_MAX_PER_HOUR:3}
  blocked-domains:
    - 10minutemail.com
    - tempmail.org
    - guerrillamail.com
    - mailinator.com
    - throwaway.email
    - temp-mail.org
    - yopmail.com