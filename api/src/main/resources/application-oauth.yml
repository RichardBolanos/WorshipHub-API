# Google OAuth2 + invitations configuration.
# Imported automatically from application.yml via `spring.config.import`.

# ====================================================================
# GOOGLE SIGN-IN (id_token verification)
# ====================================================================
# El backend NO realiza el flujo OAuth (Authorization Code). El cliente
# (Flutter Android/iOS/Web) usa el SDK de Google Sign-In, obtiene un
# `id_token` y lo envia a /api/v1/auth/oauth2/google/callback.
#
# El backend verifica:
#   1. Firma del JWT contra los JWKS publicos de Google
#   2. Que el `aud` (audience) este en la lista permitida abajo
#   3. Que `iss` sea de Google y `exp` no haya pasado
#
# Por que es una LISTA y no un solo client ID:
#   Google emite un client ID DISTINTO por cada plataforma del cliente:
#     - Android  (firmado con SHA-1 del keystore + package name)
#     - iOS      (bundle ID)
#     - Web      (origin permitido)
#   Todos deben aceptarse en este backend.
#
# Como obtenerlos:
#   https://console.cloud.google.com/apis/credentials
#   -> OAuth 2.0 Client IDs (uno por plataforma)
#
# Para la app de WorshipHub los client IDs actualmente registrados estan
# en worship_hub_ui/android/app/google-services.json -> "oauth_client".
# ====================================================================
google:
  oauth2:
    # CSV de client IDs aceptados como `aud` del id_token.
    # Ejemplo:
    #   GOOGLE_OAUTH_CLIENT_IDS=271123368190-aaa.apps.googleusercontent.com,271123368190-bbb.apps.googleusercontent.com
    allowed-client-ids: ${GOOGLE_OAUTH_CLIENT_IDS:}
    # JWKS endpoint (no cambia salvo emergencia).
    jwks-uri: https://www.googleapis.com/oauth2/v3/certs

# ====================================================================
# Rate limiting de invitaciones (placeholder)
# ====================================================================
# NOTA: Estas propiedades estan declaradas pero actualmente no son consumidas
# por ningun @Value/@ConfigurationProperties. Las dejamos definidas para
# uso futuro cuando se implemente el rate limiting.
invitation:
  rate-limit:
    max-per-day: ${INVITATION_MAX_PER_DAY:10}
    max-per-hour: ${INVITATION_MAX_PER_HOUR:3}
  blocked-domains:
    - 10minutemail.com
    - tempmail.org
    - guerrillamail.com
    - mailinator.com
    - throwaway.email
    - temp-mail.org
    - yopmail.com
