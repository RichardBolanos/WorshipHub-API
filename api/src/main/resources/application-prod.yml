server:
  ssl:
    enabled: ${SSL_ENABLED:true}
  error:
    include-stacktrace: never
    include-message: never
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/worshiphub_prod}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: WorshipHubProdCP
      
  jpa:
    hibernate:
      ddl-auto: validate # Solo validar en producción
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
    
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true # Nunca permitir clean en producción
    
  h2:
    console:
      enabled: false
      
  security:
    require-ssl: ${SSL_REQUIRED:true}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000} # 1 hora
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000} # 24 horas

logging:
  level:
    com.worshiphub: ${LOG_LEVEL:INFO}
    org.springframework: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/worshiphub-prod.log}
    max-size: 50MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  security:
    enabled: true