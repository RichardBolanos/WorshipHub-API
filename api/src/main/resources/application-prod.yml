server:
  port: ${PORT:8080}
  shutdown: graceful

# ==============================================================
# URL PUBLICA DE LA APLICACION
# ==============================================================
# Usado para construir links en emails (verificacion, reset password, invitaciones).
# OBLIGATORIO en prod, los emails llevaran links rotos si no se configura.
#
# Ejemplos:
#   APP_BASE_URL=https://worshiphub-api-latest.onrender.com
#   APP_BASE_URL=https://api.worshiphub.com   (dominio personalizado)
# ==============================================================
app:
  base-url: ${APP_BASE_URL:}
  email:
    # Remitente (From:) que verán los destinatarios. DEBE ser un sender verificado
    # en el proveedor SMTP. Si queda en blanco, los emails no se envian (se loguea
    # un error claro), evitando intentos silenciosos que el proveedor rechazaria.
    #
    # Por que esta separado de spring.mail.username:
    #   Brevo, SendGrid, AWS SES y otros usan logins SMTP de servicio
    #   (ej: aa764e001@smtp-brevo.com) que NO pueden aparecer como sender real.
    #
    # Como configurarlo en Render:
    #   APP_EMAIL_FROM=tu_email_verificado@hotmail.com
    #   APP_EMAIL_FROM=noreply@tu-dominio.com  (si tienes dominio propio verificado)
    from: ${APP_EMAIL_FROM:}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    # ==============================================================
    # CONFIGURACION DE BASE DE DATOS EN RENDER
    # ==============================================================
    # OPCION A (recomendada): UNA sola variable con todo embebido
    #   DATABASE_URL=jdbc:postgresql://host/db?user=USR&password=PWD&sslmode=require
    #
    # OPCION B: URL estandar postgres:// (se convierte automaticamente)
    #   DATABASE_URL=postgresql://USR:PWD@host/db?sslmode=require
    #
    # OPCION C: URL + credenciales separadas
    #   DATABASE_URL=jdbc:postgresql://host/db?sslmode=require
    #   DATABASE_USERNAME=usuario
    #   DATABASE_PASSWORD=password
    # ==============================================================
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    # username/password son opcionales si vienen embebidos en DATABASE_URL
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:3}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ==============================================================
  # EMAIL / SMTP
  # ==============================================================
  # IMPORTANTE: separar "credenciales SMTP" de "remitente del email".
  # Brevo, SendGrid, AWS SES, etc. asignan un usuario SMTP de servicio que NO
  # debe aparecer como sender. El "From:" del email lo controla APP_EMAIL_FROM.
  #
  # ⚠️ PUERTO 2525 EN RENDER / CLOUD HOSTING
  # ----------------------------------------
  # Render Free / muchos PaaS bloquean conexiones salientes al puerto 587
  # para prevenir spam. El sintoma es:
  #
  #   ERROR EmailServiceImpl - Failed to send email ...
  #   org.eclipse.angus.mail.util.MailConnectException:
  #     Couldn't connect to host, port: smtp-relay.brevo.com, 587; timeout
  #   java.net.SocketTimeoutException: Connect timed out
  #
  # Si ves esto en logs: cambia SPRING_MAIL_PORT a 2525 (puerto alterno
  # de Brevo, mismo servidor, misma autenticacion, mismo cifrado STARTTLS).
  #
  # Variables a configurar en Render:
  #
  #   --- SMTP (autenticacion) ---
  #   SPRING_MAIL_HOST       ej: smtp-relay.brevo.com
  #   SPRING_MAIL_PORT       PRIMERO probar 2525 (mas confiable en cloud);
  #                          587 si tu host no bloquea conexiones SMTP.
  #   SPRING_MAIL_USERNAME   usuario SMTP del proveedor
  #                          - Brevo: el "Iniciar sesion" del dashboard SMTP
  #                            (formato xxxxxxx@smtp-brevo.com)
  #                          - SendGrid: literal "apikey"
  #                          - AWS SES: el "SMTP username" generado
  #   SPRING_MAIL_PASSWORD   clave SMTP del proveedor
  #                          - Brevo: la "Clave SMTP" (nunca tu password de cuenta)
  #                          - SendGrid: tu API key (SG.xxxxx)
  #
  #   --- Remitente ("From:") ---
  #   APP_EMAIL_FROM         email que aparecera en el campo From del email.
  #                          DEBE estar verificado como sender en el proveedor.
  #                          - Brevo: https://app.brevo.com/senders/list
  #                          ej: noreply@tu-dominio.com o tu_email_personal@gmail.com
  #
  #   --- TLS / Auth (defaults sirven para casi todo) ---
  #   MAIL_SMTP_AUTH         true (default)
  #   MAIL_SMTP_STARTTLS     true (default, usar puerto 587)
  # ==============================================================
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS:true}
        # Aggressive timeouts — emails are sent asynchronously (see EmailServiceImpl),
        # so a slow SMTP provider only delays the email, never the user's HTTP response.
        # If Brevo (or whatever provider) is unreachable we want to know fast.
        connectiontimeout: 3000
        timeout: 5000
        writetimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ==============================================================
# OpenAPI / Swagger
# ==============================================================
# Disabled in production. Reasons:
#   1. Public-facing services should not advertise their internal API
#      surface or DTOs to anonymous traffic.
#   2. springdoc-openapi uses Kotlin reflection to walk @RequestBody /
#      @Schema classes. The GraalVM native image we ship to Render does
#      not include reflection metadata for every DTO + every Swagger
#      annotation, so requests to /v3/api-docs throw
#      KotlinReflectionInternalError at runtime.
#   3. Swagger UI is a development tool — devs should hit a non-prod
#      profile (default / local / h2) to browse endpoints.
# Local development still gets full Swagger via the default profile.
# ==============================================================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  # En produccion (Render/contenedores) los logs deben ir a stdout, no a archivo.
  # Render captura stdout/stderr automaticamente.
  # Para activar log a archivo: define la variable de entorno LOG_FILE=/ruta/al/log
  file:
    name: ${LOG_FILE:}
  level:
    com.worshiphub: INFO
    org.springframework: WARN
    org.hibernate: WARN
    root: INFO