spring:
  datasource:
    url: jdbc:h2:mem:worshiphub
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        
  flyway:
    enabled: false
    
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.worshiphub: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG