spring:
  datasource:
    url: jdbc:postgresql://localhost:5442/worshiphub
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
      
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    
  flyway:
    enabled: false
      
  security:
    require-ssl: false

server:
  port: 9090

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-for-development-only-not-for-production-use-32chars}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

logging:
  level:
    com.worshiphub: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction: DEBUG
    org.flywaydb: INFO
    root: INFO